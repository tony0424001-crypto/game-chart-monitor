name: Fetch Game Charts

on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install google-play-scraper

      - name: Run fetch script
        run: python fetch_charts.py

      - name: Commit and push charts.json
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add charts.json
          git diff --staged --quiet || git commit -m "Update charts $(date +%Y-%m-%d)"
          git push
